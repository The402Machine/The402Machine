services:
  web:
    build:
      context: .
    container_name: the402machine-web
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 4020
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:4020:4020"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4020/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
