server {
    listen 80;
    listen [::]:80;
    server_name the402machine.com www.the402machine.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://the402machine.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name the402machine.com www.the402machine.com;

    ssl_certificate /etc/letsencrypt/live/the402machine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/the402machine.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /health {
        limit_req zone=the402_general burst=20 nodelay;
        include /etc/nginx/snippets/the402machine-proxy.conf;
    }

    location ^~ /c/ {
        limit_req zone=the402_ingest burst=30 nodelay;
        include /etc/nginx/snippets/the402machine-proxy.conf;
    }

    location ^~ /api/catch/ {
        limit_req zone=the402_owner burst=10 nodelay;
        include /etc/nginx/snippets/the402machine-proxy.conf;
    }

    location ^~ /w/ {
        limit_req zone=the402_owner burst=10 nodelay;
        include /etc/nginx/snippets/the402machine-proxy.conf;
    }

    location = /api/payments/catch {
        limit_req zone=the402_payment_quote burst=5 nodelay;
        include /etc/nginx/snippets/the402machine-proxy.conf;
    }

    location = /api/payments/whisper {
        limit_req zone=the402_payment_quote burst=5 nodelay;
        include /etc/nginx/snippets/the402machine-proxy.conf;
    }

    location ^~ /api/payments/ {
        limit_req zone=the402_payment_check burst=10 nodelay;
        include /etc/nginx/snippets/the402machine-proxy.conf;
    }

    location ^~ /internal/ {
        limit_req zone=the402_payment_quote burst=2 nodelay;
        include /etc/nginx/snippets/the402machine-proxy.conf;
    }

    location / {
        limit_req zone=the402_general burst=40 nodelay;
        include /etc/nginx/snippets/the402machine-proxy.conf;
    }
}
