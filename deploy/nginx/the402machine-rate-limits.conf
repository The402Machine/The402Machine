# Install in the nginx http {} context, normally /etc/nginx/conf.d/.
# These zones are shared by all Nginx workers and survive application restarts.
limit_req_zone $binary_remote_addr zone=the402_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=the402_ingest:10m rate=1r/s;
limit_req_zone $binary_remote_addr zone=the402_pulse:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=the402_owner:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=the402_payment_quote:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=the402_payment_check:10m rate=30r/m;
limit_req_status 429;
